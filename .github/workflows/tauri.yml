name: Build Cross-Platform App

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        # GitHub запустит три компьютера параллельно:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      run: npm install

    - name: Build App for OS
      # Скрипт сам поймет, под какую ОС собирать в данный момент:
      run: |
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          npm run build -- --win
        elif [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
          npm run build -- --linux
        elif [ "${{ matrix.os }}" = "macos-latest" ]; then
          npm run build -- --mac
        fi
      shell: bash

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GromAI-${{ matrix.os }}-App
        path: dist/*.*
        
